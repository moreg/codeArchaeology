# Ruff 配置 (与 .pre-commit-config.yaml 配合)
# https://docs.astral.sh/ruff/

[tool.ruff]
# 项目根
target-version = "py39"
line-length = 100
extend-exclude = [
    "backend/data",
    "sample-project",
    ".venv",
    "venv",
    "build",
    "dist",
]

[tool.ruff.lint]
# 启用的规则集
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort (import 排序)
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "UP",  # pyupgrade
    "N",   # pep8-naming
    "S",   # flake8-bandit (安全)
    "T20", # flake8-print (禁用 print)
    "ASYNC", # flake8-async
    "PIE", # flake8-pie
    "RUF", # ruff 自带规则
]
ignore = [
    "E501",  # 行长（与 line-length 重复）
    "B008",  # 函数调用中的默认参数（如 Path()）
    "S101",  # assert 在测试中是必需的
    "N818",  # 异常类命名（项目用 Error 结尾）
    "E402",  # 模块级 import 不在顶部（部分插件需要 sys.path 调整）
]

[tool.ruff.lint.per-file-ignores]
"backend/tests/**/*.py" = ["S101", "S105", "S106"]  # 测试中允许 assert / 假密码
"sample-project/**/*.py" = ["ALL"]                    # 演示用屎山，不 lint
"backend/llm*mock_data*.py" = ["S301", "S302"]      # mock 数据可有 pickle/marshal

[tool.ruff.lint.isort]
known-first-party = ["app"]
combine-as-imports = true

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "auto"

# ============================================
# pytest + coverage
# ============================================

[tool.pytest.ini_options]
# 让 pytest 把 backend/ 当作根路径
testpaths = ["backend/tests"]
addopts = [
    "-ra",                 # 失败时打印所有 summary 行
    "--strict-markers",    # 拼错的 marker 立刻报错
    "--strict-config",     # 配置错误立刻报错
    "--tb=short",          # 失败 traceback 短格式
]
# 这些 marker 在测试文件里用 @pytest.mark.slow 之类标注
markers = [
    "slow: 需要网络/真实 git 仓库的慢测试",
    "integration: 跨模块集成测试",
]

[tool.coverage.run]
# 测 backend/app/ 下的代码（排除 tests 自身）
source = ["backend/app"]
branch = true            # 分支覆盖
data_file = "backend/.coverage"
omit = [
    "*/tests/*",
    "*/__init__.py",
    "*/data/*",
    "*/migrations/*",
]

[tool.coverage.report]
# 低于此值则 CI 失败。
# 当前 core/ 平均 ~70%（scoring 90 / scanner 90 / parser 79 / call_graph 71）；
# API/模型层 0%（等待 PR 增加 e2e/integration 测试）。
# 设 30 是为了让 gate 真实生效，而不是名存实亡。
# 新增 PR 应保持或抬高此值。
fail_under = 30
# 排除行：纯定义、抽象方法、debug、NotImplementedError
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "raise NotImplementedError",
    "if __name__ == .__main__.:",
    "if TYPE_CHECKING:",
    "pass",
]
# 显示缺失覆盖的行数
show_missing = true
skip_covered = false
# 排序：哪几个文件覆盖最差排前
sort = "Cover"

# ============================================
# mypy 类型检查
# ============================================

[tool.mypy]
python_version = "3.12"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = false
check_untyped_defs = true
ignore_missing_imports = true
exclude = [
    "backend/tests/",
    "sample-project/",
]

