version: '3.8'  # 新版 Compose 已忽略此字段，仅为兼容老版本保留

services:
  backend:
    build: .
    container_name: code-archaeology-backend
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ../sample-project:/sample-project:ro
    environment:
      - DATABASE_URL=sqlite:///./data/code_archaeology.db
      - LLM_MODE=${LLM_MODE:-mock}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://api.openai.com/v1}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://localhost:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen2.5}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
      - SAMPLE_PROJECT_PATH=/sample-project
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3