name: 功能建议 ✨
description: 提出新功能或改进建议
title: "[Feature]: "
labels: ["enhancement"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        欢迎提需求！在描述之前先想想：

        - 这能解决什么**用户痛点**？（不是"我想加"）
        - 是否有更简单的实现？
        - 是否已在 [路线图](https://github.com/moreg/codeArchaeology#路线图) 中？

        实施前先讨论，避免方向偏差。

  - type: dropdown
    id: priority
    attributes:
      label: 优先级
      description: 你的判断（维护者会二次评估）
      options:
        - 🔴 阻断（缺它就用不下去）
        - 🟠 高（影响日常使用）
        - 🟡 中（nice to have，但有 workaround）
        - 🟢 低（极好的话更好）
      validations:
        required: true

  - type: dropdown
    id: area
    attributes:
      label: 涉及模块
      options:
        - backend 全栈
        - backend/core (scanner/parser/call_graph/scoring)
        - backend/core/llm
        - backend/api (REST/WS)
        - frontend 全栈
        - frontend/components
        - frontend/visualization (Cytoscape)
        - docs
        - dev tooling / CI
        - 跨多个模块
      validations:
        required: true

  - type: textarea
    id: problem
    attributes:
      label: 要解决的问题
      description: 用户/开发者当前遇到什么痛点？背景是什么？
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 提议的方案
      description: 你理想中的 API、UI、行为是什么样的？可附 mockup / 草图链接
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 考虑过的替代方案
      description: 思考过的其他实现方式？为什么选了上面的？
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: 补充信息（可选）
      description: 截图、相关项目、参考资料
    validations:
      required: false
