# GitHub Pages: build frontend and deploy to gh-pages branch
# Demo-only deployment (no real backend). Mock data is bundled.
name: Deploy Frontend to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# 防止两个部署并发导致 race condition
concurrency:
  group: pages
  cancel-in-progress: false

# 允许默认 token 推送到 gh-pages 分支
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Build frontend
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        working-directory: frontend
        run: npm ci || npm install

      - name: Build with GitHub Pages base path
        working-directory: frontend
        env:
          GITHUB_PAGES: "true"
          # 仓库名为 codeArchaeology，部署到 https://<owner>.github.io/codeArchaeology/
          GITHUB_PAGES_BASE: "/${{ github.event.repository.name }}/"
        run: npm run build

      - name: Add SPA 404 fallback
        working-directory: frontend/dist
        # SPA 路由：访问 /codeArchaeology/scan/abc 时，404 兜底到 index.html
        run: cp index.html 404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
