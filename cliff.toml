# git-cliff 閰嶇疆
# https://git-cliff.org/

[changelog]
header = """
# Changelog

鏈」鐩墍鏈夐噸瑕佸彉鏇撮兘浼氳褰曞湪姝ゆ枃浠躲€?
鏍煎紡鍩轰簬 [Keep a Changelog](https://keepachangelog.com/zh-CN/1.1.0/)锛?鐗堟湰鍙烽伒寰?[Semantic Versioning](https://semver.org/lang/zh-CN/)銆?
"""
body = """
{% if version -%}
## [{{ version }}] - {{ timestamp | date_format("%Y-%m-%d") }}
{% else -%}
## [Unreleased]
{% endif -%}

{% for group, commits in commits | filter(attribute="merge_commit", value=false) | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits | sort(attribute="message") -%}
- {% if commit.scope %}**{{ commit.scope }}**: {% endif -%}
  {{ commit.message | split(pat="\n") | first | upper_first | trim }}\
  {% if commit.breaking %} **BREAKING**{% endif %}\
  ([{{ commit.id | truncate(length=7, end="") }}]({{ commit.id }}))
{% endfor %}
{% endfor %}
"""
footer = """
<!-- Generated by git-cliff -->
"""
trim = true
postprocessors = []

[git]
conventional_commits = true
filter_unconventional = false
tag_pattern = "^[0-9]+\\.[0-9]+\\.[0-9]+$"
skip_tags = "v0.0.0"
top_level = "."

# git-cliff commit_parsers 蹇呴』鐢?array of tables 璇硶
# https://git-cliff.org/docs/configuration

[[git.commit_parsers]]
message = "^feat"
group = "Features"

[[git.commit_parsers]]
message = "^fix"
group = "Bug Fixes"

[[git.commit_parsers]]
message = "^perf"
group = "Performance"

[[git.commit_parsers]]
message = "^refactor"
group = "Refactor"

[[git.commit_parsers]]
message = "^docs"
group = "Documentation"

[[git.commit_parsers]]
message = "^test"
group = "Tests"

[[git.commit_parsers]]
message = "^ci"
group = "CI"

[[git.commit_parsers]]
message = "^chore"
group = "Chore"

[[git.commit_parsers]]
message = "^style"
group = "Style"

[[git.commit_parsers]]
message = "^revert"
group = "Reverts"

[[git.commit_parsers]]
message = "^build"
group = "Build"

# 璺宠繃渚濊禆鍗囩骇鎻愪氦锛圖ependabot PR 鍣０涓嶅叆 changelog锛?[[git.commit_parsers]]
message = "^deps"
skip = true

[[git.commit_parsers]]
message = "^deps\\(dev\\)"
skip = true

# 榛樿鍒嗙粍
[[git.commit_parsers]]
message = ".*"
group = "Other"

[git.link_parsers]
sha = "https://github.com/moreg/codeArchaeology/commit/{{sha}}"