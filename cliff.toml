# git-cliff 配置
# https://git-cliff.org/

[changelog]
# CHANGELOG.md 头部
header = """
# Changelog

本项目所有重要变更都会记录在此文件。

格式基于 [Keep a Changelog](https://keepachangelog.com/zh-CN/1.1.0/)，
版本号遵循 [Semantic Versioning](https://semver.org/lang/zh-CN/)。

"""
# 每个版本的模板
body = """
{% if version -%}
## [{{ version }}] - {{ timestamp | date_format("%Y-%m-%d") }}
{% else -%}
## [Unreleased]
{% endif -%}

{% for group, commits in commits | filter(attribute="merge_commit", value=false) | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits | sort(attribute="message") -%}
- {% if commit.scope %}**{{ commit.scope }}**: {% endif -%}
  {{ commit.message | split(pat="\n") | first | upper_first | trim }}\
  {% if commit.breaking %} ⚠️ **BREAKING**{% endif %}\
  ([{{ commit.id | truncate(length=7, end="") }}]({{ commit.id }}))
{% endfor %}
{% endfor %}
"""
# 删除模板
footer = """
<!-- Generated by git-cliff -->
"""
# trim: 移除首尾空白
trim = true
# postprocessors: 在生成后处理
postprocessors = []

[git]
# 从 commit 消息解析 conventional commits
conventional_commits = true
# 过滤 merge commit
filter_unconventional = false
# 分组: feat -> Features, fix -> Bug Fixes, etc.
tag_pattern = "^[0-9]+\\.[0-9]+\\.[0-9]+$"
skip_tags = "v0.0.0"
# top-level 目录
top_level = "."

# git-cliff commit_parsers 实际语法：
# [git] section + commit_parsers = [{...}, {...}] inline table array
# （不是 [[git.commit_parsers]] array of tables 也不是 [git.commit_parsers] section）
# 按 type 分组
commit_parsers = [
  { message = "^feat", group = "Features" },
  { message = "^fix", group = "Bug Fixes" },
  { message = "^perf", group = "Performance" },
  { message = "^refactor", group = "Refactor" },
  { message = "^docs", group = "Documentation" },
  { message = "^test", group = "Tests" },
  { message = "^ci", group = "CI" },
  { message = "^chore", group = "Chore" },
  { message = "^style", group = "Style" },
  { message = "^revert", group = "Reverts" },
  { message = "^build", group = "Build" },
  # 跳过依赖升级提交（Dependabot PR 噪声不入 changelog）
  # 顺序敏感：先匹配更具体的 ^deps(dev) 再 ^deps
  { message = "^deps\\(dev\\)", skip = true },
  { message = "^deps", skip = true },
  # 默认分组
  { message = ".*", group = "Other" },
]

[git.link_parsers]
# 把 commit id 链接到 GitHub
sha = "https://github.com/moreg/codeArchaeology/commit/{{sha}}"
