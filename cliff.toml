# git-cliff config
# https://git-cliff.org/

[changelog]
# Changelog header
header = """
# Changelog

Format based on [Keep a Changelog](https://keepachangelog.com/en/1.1.0/),
version numbers follow [Semantic Versioning](https://semver.org/).

"""
# Per-version template (Tera)
body = """
{% if version -%}
## [{{ version }}] - {{ timestamp | date_format("%Y-%m-%d") }}
{% else -%}
## [Unreleased]
{% endif -%}

{% for group, commits in commits | filter(attribute="merge_commit", value=false) | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits | sort(attribute="message") -%}
- {% if commit.scope %}**{{ commit.scope }}**: {% endif -%}
  {{ commit.message | split(pat="\n") | first | upper_first | trim }}\
  {% if commit.breaking %} **BREAKING**{% endif -%}\
  ([{{ commit.id | truncate(length=7, end="") }}]({{ commit.id }}))
{% endfor %}
{% endfor %}
"""
footer = """
<!-- Generated by git-cliff -->
"""
trim = true
postprocessors = []

[git]
# Parse commits as conventional commits
conventional_commits = true
filter_unconventional = false
tag_pattern = "^[0-9]+\\.[0-9]+\\.[0-9]+$"
skip_tags = "v0.0.0"
top_level = "."

# git-cliff commit_parsers official syntax:
# inline table array assigned to commit_parsers inside [git] section
# (NOT [[git.commit_parsers]] array of tables)
commit_parsers = [
  { message = "^feat", group = "Features" },
  { message = "^fix", group = "Bug Fixes" },
  { message = "^perf", group = "Performance" },
  { message = "^refactor", group = "Refactor" },
  { message = "^docs", group = "Documentation" },
  { message = "^test", group = "Tests" },
  { message = "^ci", group = "CI" },
  { message = "^chore", group = "Chore" },
  { message = "^style", group = "Style" },
  { message = "^revert", group = "Reverts" },
  { message = "^build", group = "Build" },
  # Skip dependabot noise
  { message = "^deps", skip = true },
  # Default bucket
  { message = ".*", group = "Other" },
]

[git.link_parsers]
# Link commit ids to GitHub
sha = "https://github.com/moreg/codeArchaeology/commit/{{sha}}"