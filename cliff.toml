# git-cliff 閰嶇疆
# https://git-cliff.org/

[changelog]
# CHANGELOG.md 澶撮儴
header = """
# Changelog

鏈」鐩墍鏈夐噸瑕佸彉鏇撮兘浼氳褰曞湪姝ゆ枃浠躲€?
鏍煎紡鍩轰簬 [Keep a Changelog](https://keepachangelog.com/zh-CN/1.1.0/)锛?鐗堟湰鍙烽伒寰?[Semantic Versioning](https://semver.org/lang/zh-CN/)銆?
"""
# 姣忎釜鐗堟湰鐨勬ā鏉?body = """
{% if version -%}
## [{{ version }}] - {{ timestamp | date_format("%Y-%m-%d") }}
{% else -%}
## [Unreleased]
{% endif -%}

{% for group, commits in commits | filter(attribute="merge_commit", value=false) | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits | sort(attribute="message") -%}
- {% if commit.scope %}**{{ commit.scope }}**: {% endif -%}
  {{ commit.message | split(pat="\n") | first | upper_first | trim }}\
  {% if commit.breaking %} **BREAKING**{% endif %}\
  ([{{ commit.id | truncate(length=7, end="") }}]({{ commit.id }}))
{% endfor %}
{% endfor %}
"""
# 鍒犻櫎妯℃澘
footer = """
<!-- Generated by git-cliff -->
"""
# trim: 绉婚櫎棣栧熬绌虹櫧
trim = true
# postprocessors: 鍦ㄧ敓鎴愬悗澶勭悊
postprocessors = []

[git]
# 浠?commit 娑堟伅瑙ｆ瀽 conventional commits
conventional_commits = true
# 杩囨护 merge commit
filter_unconventional = false
# 鍒嗙粍: feat -> Features, fix -> Bug Fixes, etc.
tag_pattern = "^[0-9]+\\.[0-9]+\\.[0-9]+$"
skip_tags = "v0.0.0"
# top-level 鐩綍
top_level = "."

# git-cliff commit_parsers 瀹為檯璇硶锛坧er official cliff.toml锛夛細
# [git] section 鍐呯敤涓€涓?inline table array 璧嬪€肩粰 commit_parsers
# 锛堜笉鏄?[[git.commit_parsers]] array of tables 涔熶笉鏄?[git.commit_parsers] section锛?commit_parsers = [
  { message = "^feat", group = "Features" },
  { message = "^fix", group = "Bug Fixes" },
  { message = "^perf", group = "Performance" },
  { message = "^refactor", group = "Refactor" },
  { message = "^docs", group = "Documentation" },
  { message = "^test", group = "Tests" },
  { message = "^ci", group = "CI" },
  { message = "^chore", group = "Chore" },
  { message = "^style", group = "Style" },
  { message = "^revert", group = "Reverts" },
  { message = "^build", group = "Build" },
  # 璺宠繃渚濊禆鍗囩骇鎻愪氦锛圖ependabot PR 鍣０涓嶅叆 changelog锛?  { message = "^deps", skip = true },
  # 榛樿鍒嗙粍
  { message = ".*", group = "Other" },
]

[git.link_parsers]
# 鎶?commit id 閾炬帴鍒?GitHub
sha = "https://github.com/moreg/codeArchaeology/commit/{{sha}}"